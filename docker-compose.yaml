services:
  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: ghcr.io/redis-commander/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    user: redis
    ports:
      - "8081:8081"